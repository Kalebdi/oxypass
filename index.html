<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BypassTools Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#18181b] border border-[#27272a] rounded-2xl p-8 shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 gradient-text text-center">BypassTools</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Tanpa Tampermonkey - Versi API Fetch</p>

        <div class="space-y-4">
            <input type="text" id="targetUrl" placeholder="Paste link iklan di sini..." 
                class="w-full bg-[#09090b] border border-[#3f3f46] rounded-xl p-4 text-white focus:outline-none focus:border-[#8b5cf6] transition-all">
            
            <button onclick="startBypass()" id="btnAction"
                class="w-full bg-gradient-to-r from-[#8b5cf6] to-[#7c3aed] text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all">
                BYPASS SEKARANG →
            </button>
        </div>

        <div id="resultBox" class="mt-8 hidden animate-fade-in text-center">
            <p class="text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Hasil Link:</p>
            <div id="resultLink" class="bg-[#09090b] border border-[#3f3f46] p-4 rounded-lg break-all text-[#a78bfa] font-mono text-sm">
                Menunggu...
            </div>
            <button onclick="copyResult()" class="mt-4 text-xs text-gray-400 hover:text-white underline">Salin Link</button>
        </div>

        <div id="status" class="mt-4 text-xs text-center text-gray-600 italic"></div>
    </div>

    <script>
        async function startBypass() {
            const urlInput = document.getElementById('targetUrl').value;
            const resBox = document.getElementById('resultBox');
            const resLink = document.getElementById('resultLink');
            const btn = document.getElementById('btnAction');
            const status = document.getElementById('status');

            if (!urlInput) return alert("Masukkan URL dulu!");

            // Reset UI
            btn.disabled = true;
            btn.innerText = "SEDANG PROSES...";
            status.innerText = "Menghubungi server via Proxy...";
            resBox.classList.add('hidden');

            try {
                // MENGGUNAKAN LOGIKA API DARI SCRIPT YANG KAMU BERIKAN
                // Kita pakai CORS Proxy supaya tidak diblokir browser
                const proxy = "https://corsproxy.io/?";
                const apiUrl = `https://wik22.bypass.tools/api/bypass?url=${encodeURIComponent(urlInput)}`;

                const response = await fetch(proxy + encodeURIComponent(apiUrl), {
                    method: 'GET',
                    headers: { 'X-API-Key': '12345678' } // API Key dari script tadi
                });

                if (!response.ok) throw new Error("Server tidak merespon");

                const data = await response.json();
                
                // Ambil link hasil (pyl atau destination)
                const finalUrl = data.result || data.destination || data.url;

                if (finalUrl) {
                    resLink.innerText = finalUrl;
                    resBox.classList.remove('hidden');
                    status.innerText = "Bypass Berhasil!";
                } else {
                    status.innerText = "Gagal: Link tidak ditemukan di respon server.";
                }

            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
                alert("Gagal bypass. Pastikan link benar atau coba lagi nanti.");
            } finally {
                btn.disabled = false;
                btn.innerText = "BYPASS SEKARANG →";
            }
        }

        function copyResult() {
            const text = document.getElementById('resultLink').innerText;
            navigator.clipboard.writeText(text);
            alert("Tersalin!");
        }
    </script>
</body>
</html>
