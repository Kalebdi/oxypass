<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 30, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass w-full max-w-md p-8 rounded-[36px] shadow-2xl text-center">
        <h1 id="title" class="text-xl font-medium mb-6">Masukkan Link Iklan</h1>
        
        <div id="step-input" class="space-y-4">
            <input type="text" id="urlInput" placeholder="https://linkvertise.com/..." 
                class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 focus:outline-none focus:border-blue-500 transition-all">
            <button onclick="showCaptcha()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all">
                LANJUT KE CAPTCHA
            </button>
        </div>

        <div id="step-captcha" class="hidden">
            <div class="bg-black/50 p-4 rounded-2xl inline-block border border-white/10 mb-4">
                <iframe id="ts-iframe" src="https://userscript.baconbypass.online/load-cf" 
                    style="width:320px; height:80px; border:none; border-radius:10px;"></iframe>
            </div>
            <p class="text-gray-400 text-sm italic">Selesaikan captcha di atas untuk lanjut</p>
        </div>

        <div id="step-loading" class="hidden flex flex-col items-center gap-4">
            <div class="loader"></div>
            <p>Sedang memproses API...</p>
        </div>

        <div id="step-result" class="hidden mt-4">
            <div id="resultContent" class="bg-black/40 border-l-4 border-green-500 p-4 rounded-xl text-left break-all font-mono text-sm mb-4">
            </div>
            <button onclick="location.reload()" class="text-blue-400 text-xs underline">Bypass Link Lain</button>
        </div>
    </div>

    <script>
        let targetUrl = "";

        function showCaptcha() {
            targetUrl = document.getElementById('urlInput').value;
            if(!targetUrl) return alert("Isi URL-nya dulu bos!");
            
            document.getElementById('step-input').classList.add('hidden');
            document.getElementById('step-captcha').classList.remove('hidden');
            document.getElementById('title').innerText = "Selesaikan Captcha";
        }

        // Mendengarkan pesan dari Iframe Captcha (PENTING!)
        window.addEventListener("message", async (e) => {
            if (e.data && (e.data.type === "CF_SOLVED" || e.data.type === "TURNSTILE_SOLVED")) {
                const token = e.data.token;
                await sendToApi(token);
            }
        });

        async function sendToApi(token) {
            document.getElementById('step-captcha').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');
            document.getElementById('title').innerText = "Fetching API...";

            try {
                // Sesuai dengan source code asli yang kamu kasih
                const response = await fetch("https://userscript.baconbypass.online/adlink", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        url: targetUrl, 
                        token: token 
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    showResult(data.result, true);
                } else {
                    showResult(data.message || "Gagal Bypass", false);
                }
            } catch (err) {
                showResult("Error Koneksi: " + err.message, false);
            }
        }

        function showResult(msg, isSuccess) {
            document.getElementById('step-loading').classList.add('hidden');
            const resBox = document.getElementById('step-result');
            const resContent = document.getElementById('resultContent');
            
            resBox.classList.remove('hidden');
            resContent.innerText = msg;
            resContent.classList.toggle('border-green-500', isSuccess);
            resContent.classList.toggle('border-red-500', !isSuccess);
            document.getElementById('title').innerText = isSuccess ? "Berhasil!" : "Gagal!";
            
            // Auto copy jika success dan berupa link
            if(isSuccess && msg.startsWith('http')) {
                navigator.clipboard.writeText(msg);
                alert("Link berhasil di-bypass dan disalin!");
            }
        }
    </script>
</body>
</html>
