<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 Delta Key Decoder | Bos Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0b0c10, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(20, 25, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 200, 0.15);
            border-radius: 32px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,200,0.1) inset;
            text-align: center;
        }
        h1 {
            color: white;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        h1 span {
            background: linear-gradient(135deg, #00ffcc, #5f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #a0b0c0;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 16px 18px;
            border: none;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.15);
        }
        input::placeholder {
            color: #7a8a9a;
            font-size: 0.9rem;
        }
        button {
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #00ccaa, #2a6fdb);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 5px 15px rgba(0, 200, 200, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 255, 200, 0.3);
        }
        button:active {
            transform: scale(0.98);
        }
        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 22px;
            margin-top: 15px;
            border-left: 6px solid #00ffcc;
            text-align: left;
        }
        .result-label {
            color: #9aaebf;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .key-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.25);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid #2a3a4a;
        }
        #keyText {
            flex: 1;
            color: #00ffcc;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-all;
            letter-spacing: 0.5px;
        }
        .copy-btn {
            background: #2a3a50;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: none;
        }
        .copy-btn:hover {
            background: #3a4a60;
        }
        .error-message {
            color: #ff7b8c;
            margin-top: 8px;
        }
        .footer-note {
            margin-top: 25px;
            color: #6a7a8a;
            font-size: 0.8rem;
        }
        .supported-badge {
            display: inline-block;
            background: rgba(0,255,200,0.08);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #b0c8d8;
            margin-top: 10px;
            border: 1px dashed #3a5a6a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 <span>Delta</span> Key</h1>
        <div class="subtitle">Decode link Loot-Link / Platoboost jadi key</div>
        
        <div class="input-wrapper">
            <input type="text" id="urlInput" placeholder="https://loot-link.com/s?r=..." autocomplete="off" />
            <button id="decodeBtn">Decode</button>
        </div>
        
        <button id="pasteBtn" style="background: #2a3a50; box-shadow: none; margin-right: 8px;">📋 Paste</button>
        <button id="clearBtn" style="background: #3a2a3a; box-shadow: none;">🗑️ Clear</button>
        
        <div id="resultContainer" style="display: none;">
            <div class="result-box">
                <div class="result-label">🔑 Decoded Key</div>
                <div class="key-display">
                    <span id="keyText">-</span>
                    <button class="copy-btn" id="copyKeyBtn">Copy</button>
                </div>
                <div id="errorMsg" class="error-message"></div>
            </div>
        </div>
        
        <div class="supported-badge">
            ✅ Support: loot-link.com • gateway.platoboost.com
        </div>
        <div class="footer-note">
            ⚡ Paste link, decode, copy key → paste di game Roblox
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const urlInput = document.getElementById('urlInput');
            const decodeBtn = document.getElementById('decodeBtn');
            const pasteBtn = document.getElementById('pasteBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultContainer = document.getElementById('resultContainer');
            const keyText = document.getElementById('keyText');
            const errorMsg = document.getElementById('errorMsg');
            const copyKeyBtn = document.getElementById('copyKeyBtn');
            
            let currentKey = '';
            
            // Fungsi untuk mengambil parameter 'r' dari URL
            function getRParameter(url) {
                try {
                    const urlObj = new URL(url);
                    return urlObj.searchParams.get('r');
                } catch (e) {
                    // Fallback: coba manual regex
                    const match = url.match(/[?&]r=([^&]+)/);
                    return match ? match[1] : null;
                }
            }
            
            // Fungsi decode base64 (browser native)
            function decodeBase64(str) {
                try {
                    // Bersihkan karakter yang tidak valid
                    const cleaned = str.replace(/\s/g, '');
                    return atob(cleaned);
                } catch (e) {
                    return null;
                }
            }
            
            // Proses decode utama
            function processDecode() {
                const url = urlInput.value.trim();
                if (!url) {
                    showError('Masukkan URL terlebih dahulu');
                    return;
                }
                
                const rParam = getRParameter(url);
                if (!rParam) {
                    showError('Parameter "r" tidak ditemukan dalam URL');
                    return;
                }
                
                const decoded = decodeBase64(rParam);
                if (!decoded) {
                    showError('Gagal decode base64. Pastikan parameter valid.');
                    return;
                }
                
                // Sukses
                currentKey = decoded;
                keyText.textContent = decoded;
                errorMsg.textContent = '';
                resultContainer.style.display = 'block';
            }
            
            function showError(message) {
                currentKey = '';
                keyText.textContent = '-';
                errorMsg.textContent = '❌ ' + message;
                resultContainer.style.display = 'block';
            }
            
            // Event Listeners
            decodeBtn.addEventListener('click', processDecode);
            
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    processDecode();
                }
            });
            
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    urlInput.value = text;
                    // Optional: auto decode setelah paste
                    // processDecode();
                } catch (err) {
                    alert('Tidak bisa mengakses clipboard. Paste manual ya.');
                }
            });
            
            clearBtn.addEventListener('click', () => {
                urlInput.value = '';
                resultContainer.style.display = 'none';
                currentKey = '';
            });
            
            copyKeyBtn.addEventListener('click', async () => {
                if (!currentKey) return;
                try {
                    await navigator.clipboard.writeText(currentKey);
                    // Feedback visual
                    copyKeyBtn.textContent = 'Copied!';
                    copyKeyBtn.style.background = '#00aa88';
                    setTimeout(() => {
                        copyKeyBtn.textContent = 'Copy';
                        copyKeyBtn.style.background = '#2a3a50';
                    }, 1500);
                } catch (err) {
                    // Fallback untuk browser lama
                    const textArea = document.createElement('textarea');
                    textArea.value = currentKey;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    copyKeyBtn.textContent = 'Copied!';
                    setTimeout(() => {
                        copyKeyBtn.textContent = 'Copy';
                    }, 1000);
                }
            });
            
            // Contoh placeholder saat load (bisa dihapus)
            urlInput.value = 'https://loot-link.com/s?r=SGVsbG8gV29ybGQh'; // contoh "Hello World!"
            
        })();
    </script>
</body>
</html>
