<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>izen.lol - Link Bypass Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9em;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s ease-out;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: monospace;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .checkbox-group label {
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.45);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        .result-url {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85em;
            margin: 15px 0;
            color: #a78bfa;
        }

        .copy-btn {
            width: auto;
            padding: 8px 20px;
            margin-top: 10px;
            background: rgba(99, 102, 241, 0.3);
            box-shadow: none;
        }

        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            width: 0%;
            transition: width 0.1s linear;
        }

        .countdown {
            text-align: center;
            margin-top: 15px;
            color: #c4b5fd;
            font-variant-numeric: tabular-nums;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .supported-domains {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .supported-domains h3 {
            color: #94a3b8;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .domain-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .domain-tag {
            background: rgba(99, 102, 241, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            color: #a78bfa;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 20px;
            }
            
            .logo {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">izen.lol</div>
            <div class="subtitle">Link Shortener Bypass Tool</div>
        </div>

        <div class="card">
            <div id="alert" class="alert"></div>

            <div class="form-group">
                <label>🔗 Masukkan Link yang ingin di-bypass</label>
                <textarea id="linkInput" placeholder="https://linkvertise.com/...&#10;https://work.ink/...&#10;https://sub2unlock.com/..."></textarea>
            </div>

            <div class="form-group">
                <label>⚙️ Pengaturan</label>
                <select id="apiKeySelect">
                    <option value="">Tanpa API Key (Default)</option>
                    <option value="public">Public API</option>
                </select>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="waitBeforeRedirect" checked>
                    <label>⏱️ Tampilkan halaman tunggu sebelum redirect</label>
                </div>
            </div>

            <div class="form-group">
                <label>⏰ Waktu tunggu (detik)</label>
                <input type="number" id="waitTime" value="5" min="0" max="30">
            </div>

            <button id="bypassBtn">🚀 Bypass Link</button>

            <div id="progressContainer" class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="countdown" id="countdownText"></div>
            </div>

            <div id="resultCard" class="result-card">
                <h3 style="color: #cbd5e1; margin-bottom: 10px;">✅ Link Berhasil Ditemukan</h3>
                <div class="result-url" id="resultUrl"></div>
                <button class="copy-btn" id="copyBtn">📋 Salin Link</button>
                <button class="copy-btn" id="openBtn" style="margin-left: 10px;">🔗 Buka Link</button>
            </div>

            <div class="supported-domains">
                <h3>📋 Domain yang Didukung (200+):</h3>
                <div class="domain-list">
                    <span class="domain-tag">linkvertise.com</span>
                    <span class="domain-tag">work.ink</span>
                    <span class="domain-tag">sub2unlock.com</span>
                    <span class="domain-tag">loot-link.com</span>
                    <span class="domain-tag">mega-redirect.com</span>
                    <span class="domain-tag">pastebin.com</span>
                    <span class="domain-tag">rekonise.com</span>
                    <span class="domain-tag">link-to.net</span>
                    <span class="domain-tag">link-hub.net</span>
                    <span class="domain-tag">direct-link.net</span>
                    <span class="domain-tag">fast-links.org</span>
                    <span class="domain-tag">rapid-links.net</span>
                    <span class="domain-tag">+200 lainnya...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Domain yang didukung
        const supportedDomains = [
            'linkvertise.com', 'work.ink', 'sub2unlock.com', 'loot-link.com', 
            'mega-redirect.com', 'pastebin.com', 'rekonise.com', 'link-to.net',
            'link-hub.net', 'direct-link.net', 'fast-links.org', 'rapid-links.net',
            'platorelay.com', 'platoboost.app', 'pandadevelopment.net', 'violated.lol',
            'hydrogen.lat', 'lootdest.org', 'free-content.pro', 'discordlink.cc'
        ];

        // Cek apakah link didukung
        function isSupported(url) {
            try {
                const urlObj = new URL(url);
                return supportedDomains.some(domain => urlObj.hostname.includes(domain));
            } catch {
                return false;
            }
        }

        // Extract redirect URL dari berbagai layanan
        async function extractRedirectUrl(url) {
            // Simulasi bypass untuk demo
            // Dalam implementasi nyata, ini akan melakukan request ke API atau scraping
            
            return new Promise((resolve) => {
                setTimeout(() => {
                    // Simulasi ekstraksi URL
                    const mockUrls = {
                        'linkvertise': 'https://example.com/final-destination',
                        'work.ink': 'https://example.com/content',
                        'default': 'https://example.com/redirected-content'
                    };
                    
                    let finalUrl = mockUrls.default;
                    for (const [key, value] of Object.entries(mockUrls)) {
                        if (url.includes(key)) {
                            finalUrl = value;
                            break;
                        }
                    }
                    
                    resolve(finalUrl);
                }, 1500);
            });
        }

        // Tampilkan alert
        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
            
            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 5000);
        }

        // Copy ke clipboard
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showAlert('Link berhasil disalin!', 'success');
            } catch (err) {
                showAlert('Gagal menyalin link', 'error');
            }
        }

        // Progress bar dan countdown
        async function startCountdown(seconds, onComplete) {
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const countdownText = document.getElementById('countdownText');
            
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            
            let elapsed = 0;
            const interval = setInterval(() => {
                elapsed++;
                const percent = (elapsed / seconds) * 100;
                progressFill.style.width = `${percent}%`;
                countdownText.textContent = `Redirecting dalam ${seconds - elapsed} detik...`;
                
                if (elapsed >= seconds) {
                    clearInterval(interval);
                    countdownText.textContent = 'Mengalihkan...';
                    onComplete();
                }
            }, 1000);
            
            return () => clearInterval(interval);
        }

        // Proses bypass
        async function processBypass() {
            const linkInput = document.getElementById('linkInput');
            const bypassBtn = document.getElementById('bypassBtn');
            const waitBeforeRedirect = document.getElementById('waitBeforeRedirect').checked;
            const waitTime = parseInt(document.getElementById('waitTime').value);
            const resultCard = document.getElementById('resultCard');
            const resultUrlEl = document.getElementById('resultUrl');
            
            let url = linkInput.value.trim();
            
            if (!url) {
                showAlert('Masukkan link terlebih dahulu!', 'error');
                return;
            }
            
            // Tambahkan https jika tidak ada
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            // Validasi URL
            if (!isSupported(url)) {
                showAlert('Domain tidak didukung atau format URL tidak valid!', 'error');
                return;
            }
            
            // Disable button selama proses
            bypassBtn.disabled = true;
            bypassBtn.textContent = '⏳ Memproses...';
            resultCard.classList.remove('show');
            
            try {
                // Simulasi ekstraksi URL
                showAlert('Sedang memproses link...', 'success');
                
                const finalUrl = await extractRedirectUrl(url);
                
                resultUrlEl.textContent = finalUrl;
                resultCard.classList.add('show');
                
                if (waitBeforeRedirect && waitTime > 0) {
                    await startCountdown(waitTime, () => {
                        window.open(finalUrl, '_blank');
                    });
                } else {
                    showAlert('Redirecting...', 'success');
                    setTimeout(() => {
                        window.open(finalUrl, '_blank');
                    }, 500);
                }
                
                showAlert('Link berhasil diproses!', 'success');
                
            } catch (error) {
                showAlert('Gagal memproses link: ' + error.message, 'error');
            } finally {
                bypassBtn.disabled = false;
                bypassBtn.textContent = '🚀 Bypass Link';
            }
        }

        // Event listeners
        document.getElementById('bypassBtn').addEventListener('click', processBypass);
        document.getElementById('copyBtn').addEventListener('click', () => {
            const resultUrl = document.getElementById('resultUrl').textContent;
            if (resultUrl) copyToClipboard(resultUrl);
        });
        document.getElementById('openBtn').addEventListener('click', () => {
            const resultUrl = document.getElementById('resultUrl').textContent;
            if (resultUrl) window.open(resultUrl, '_blank');
        });
        
        // Enter key support
        document.getElementById('linkInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                processBypass();
            }
        });
        
        // Load contoh link untuk testing
        console.log('Tool siap digunakan!');
    </script>
</body>
</html>
