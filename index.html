<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>API Source Sniffer</title>
    <style>
        body { background: #0a0a0c; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 1px solid #00ff41; padding: 20px; border-radius: 5px; background: #000; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        h2 { border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin: 10px 0; outline: none; }
        button { width: 100%; padding: 10px; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #00cc33; box-shadow: 0 0 10px #00ff41; }
        #source-output { margin-top: 20px; padding: 15px; border: 1px dashed #555; background: #050505; white-space: pre-wrap; word-break: break-all; color: #00bcff; min-height: 50px; }
        .label { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>[ API SOURCE FISHING ]</h2>
    <p class="label">Masukkan endpoint API (atau link yang kamu kasih tadi):</p>
    <input type="text" id="apiUrl" value="https://baconbypass.online/get-key?hwid=379C7DFF2138EED236BA11A1A88100D8">
    <button onclick="pullSource()">TARIK SOURCE / DATA</button>

    <div style="margin-top: 20px;">
        <span class="label">Response Source:</span>
        <div id="source-output">Menunggu perintah...</div>
    </div>
</div>

<script>
    async function pullSource() {
        const url = document.getElementById('apiUrl').value;
        const output = document.getElementById('source-output');
        
        output.innerText = "Connecting to server... Mancing data...";
        output.style.color = "#00bcff";

        try {
            // Kita gunakan proxy AllOrigins untuk menembus proteksi CORS browser
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
            
            const response = await fetch(proxy);
            if (!response.ok) throw new Error("Gagal mengambil data.");
            
            const data = await response.json();
            
            // Inilah source code / raw data yang dikirim balik oleh server
            if (data.contents) {
                output.innerText = data.contents;
                output.style.color = "#00ff41";
                console.log("Source Berhasil Ditarik:", data.contents);
            } else {
                output.innerText = "Server mengembalikan data kosong atau terproteksi.";
            }

        } catch (err) {
            output.innerText = "ERROR: " + err.message + "\n\nTips: Pastikan koneksi internet aktif atau coba matikan AdBlock.";
            output.style.color = "#ff4141";
        }
    }
</script>

</body>
</html>
