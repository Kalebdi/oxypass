<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Link Bypass | Bos Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 200, 0.2) inset;
            text-align: center;
        }
        h1 {
            color: #fff;
            font-weight: 600;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        h1 span {
            background: linear-gradient(135deg, #00ffcc, #3375ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #aab;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
        }
        input::placeholder {
            color: #889;
        }
        button {
            padding: 16px 28px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #00ffcc, #3375ff);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0, 255, 200, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 255, 200, 0.5);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            border-left: 5px solid #00ffcc;
            margin-top: 20px;
            word-break: break-all;
        }
        .result-label {
            color: #aac;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .result-link {
            color: #00ffcc;
            font-size: 1.1rem;
            text-decoration: none;
            font-weight: 500;
        }
        .result-link:hover {
            text-decoration: underline;
        }
        .error {
            border-left-color: #ff5577;
            color: #ffa0b0;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            margin-top: 30px;
            color: #667;
            font-size: 0.8rem;
        }
        .supported {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }
        .badge {
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #ccd;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 <span>Bypass</span> Tool</h1>
        <div class="sub">Tempel link shortener, langsung dapat aslinya</div>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://linkvertise.com/xxx" autocomplete="off" />
            <button id="submitBtn">🚀 Bypass</button>
        </div>
        
        <div class="supported">
            <span class="badge">Linkvertise</span>
            <span class="badge">LootLabs</span>
            <span class="badge">Rekonise</span>
            <span class="badge">Pastebin</span>
            <span class="badge">Sub2Get</span>
            <span class="badge">Boost.ink</span>
            <span class="badge">+40 lainnya</span>
        </div>
        
        <div id="resultContainer" style="display: none;">
            <div class="result-box" id="resultBox">
                <div class="result-label">Link Asli</div>
                <a href="#" target="_blank" class="result-link" id="resultLink"></a>
            </div>
        </div>
        
        <div class="footer">
            ⚡ Powered by hidden backend • No logs
        </div>
    </div>

    <script>
        const input = document.getElementById('urlInput');
        const btn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultLink = document.getElementById('resultLink');
        const resultBox = document.getElementById('resultBox');
        
        async function bypass() {
            const url = input.value.trim();
            if (!url) {
                alert('Masukkan URL dulu Bos!');
                return;
            }
            
            // Tampilkan loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Bypassing...';
            resultContainer.style.display = 'none';
            
            try {
                const response = await fetch('/api/bypass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultLink.href = data.result;
                    resultLink.textContent = data.result;
                    resultBox.className = 'result-box';
                    resultContainer.style.display = 'block';
                } else {
                    resultLink.href = '#';
                    resultLink.textContent = data.error || 'Gagal bypass';
                    resultBox.className = 'result-box error';
                    resultContainer.style.display = 'block';
                }
            } catch (err) {
                resultLink.href = '#';
                resultLink.textContent = 'Terjadi kesalahan jaringan';
                resultBox.className = 'result-box error';
                resultContainer.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Bypass';
            }
        }
        
        btn.addEventListener('click', bypass);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') bypass();
        });
        
    </script>
</body>
</html>
